name: Sync Prices (Every 2 Hours)

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install pg
      - name: Sync prices to database
        run: node .github/scripts/sync-prices.mjs
      - name: Retry on failure
        if: failure()
        run: sleep 30 && node .github/scripts/sync-prices.mjs